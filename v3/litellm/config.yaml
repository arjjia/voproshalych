general_settings:
  master_key: ${LITELLM_MASTER_KEY}
  database_url: postgresql://voproshalych:voproshalych@postgres:5432/voproshalych
  otel: false

model_list:
  - model_name: mistral-nemo
    litellm_params:
      model: mistral/open-mistral-nemo
      api_key: os.environ/MISTRAL_API_KEY
      max_tokens: 4096
      temperature: 0.7
    model_info:
      mode: completion
      cost_per_token: 0.0

  - model_name: mistral-classifier
    litellm_params:
      model: mistral/open-mistral-nemo
      api_key: os.environ/MISTRAL_API_KEY
      max_tokens: 512
      temperature: 0.1
    model_info:
      mode: completion
      cost_per_token: 0.0

  - model_name: mistral-embed
    litellm_params:
      model: mistral/mistral-embed
      api_key: os.environ/MISTRAL_API_KEY
    model_info:
      mode: embedding
      cost_per_token: 0.0


litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    ttl: 3600
