stages:
  - build
  - test
  - deploy
  - prune

variables:
  COMPOSE_PROJECT_NAME: voproshalych_v2
  DOCKER_BUILDKIT: "1"

build:
  stage: build
  before_script:
    - cp $ENV_PRODUCTION .env
  script:
    - docker compose build
    - docker images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}" | grep voproshalych_v2
  only:
    - main
  tags:
    - srv-virtassist01

test:
  stage: test
  before_script:
    - cp $ENV_PRODUCTION .env
  script:
    - docker compose run --no-deps --rm -v "$CI_PROJECT_DIR/qa-service/tests:/app/tests:ro" qa-service uv run pytest tests/ -v
  allow_failure: true
  only:
    - main
  tags:
    - srv-virtassist01

deploy:
  stage: deploy
  environment: production
  before_script:
    - cp $ENV_PRODUCTION .env
  script:
    - docker compose up -d postgres db-migrate qa-service bot-core telegram-bot vk-bot max-bot admin-service admin-ui
    - docker compose logs -t db-migrate
    - docker compose ps
  only:
    - main
  tags:
    - srv-virtassist01

prune:
  stage: prune
  script:
    - docker container prune -f
    - docker image prune -af
    - docker network prune -f
    - docker builder prune --filter unused-for=30m -f
    - docker system df
    - df -h /
  only:
    - main
  tags:
    - srv-virtassist01
