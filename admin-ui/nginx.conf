server {
    listen       80;
    server_name  _;

    # === VPN allowlist (заполнить при деплое в университете) =====================
    # Раскомментировать и подставить подсеть корпоративной сети ТюмГУ:
    #   allow 10.0.0.0/8;
    #   allow 172.16.0.0/12;
    #   deny  all;
    # =============================================================================

    root   /usr/share/nginx/html;
    index  index.html;

    # Статика SPA
    location / {
        try_files $uri /index.html;
    }

    # Прокси на admin-service
    location /api/ {
        proxy_pass         http://admin-service:8005/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Кэш статики с хэшем
    location ~* \.(?:css|js|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
